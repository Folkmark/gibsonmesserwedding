<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP — Gibson &amp; Messer</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="texture-overlay"></div>

    <div class="menu-overlay" id="menu-overlay">
        <div class="menu-grid">
            <div class="menu-col">
                <a href="/"            class="statement-font menu-link menu-close-trigger">Home</a>
                <a href="/our-story/"  class="statement-font menu-link menu-close-trigger">Our story</a>
                <a href="/events/"     class="statement-font menu-link menu-close-trigger">Events</a>
                <a href="/travel/"     class="statement-font menu-link menu-close-trigger">Travel</a>
            </div>
            <div class="menu-col">
                <a href="/rsvp/"      class="subheader-font menu-sublink menu-close-trigger">Rsvp</a>
                <a href="/registry/"  class="subheader-font menu-sublink menu-close-trigger">Registry</a>
                <a href="/faq/"       class="subheader-font menu-sublink menu-close-trigger">Faq</a>
            </div>
        </div>
    </div>

    <nav>
        <a href="/" class="nav-logo">
            <img src="../assets/RileyandSamTwistingHeartMonogramwithCrown (1).png" alt="Gibson &amp; Messer Monogram">
        </a>
        <button class="hamburger" id="menu-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main>
        <section class="page-hero">
            <div class="page-hero-bg" style="background: linear-gradient(rgba(30,58,74,0.5), rgba(42,31,20,0.8)), url('../assets/Florals.jpg') center/cover no-repeat;"></div>
            <h1 class="statement-font reveal-up">RSVP</h1>
        </section>

        <section class="content-section">
            <div class="content-grid">
                <div class="reveal-up">
                    <h2 class="statement-font section-title">Please respond</h2>
                </div>
                <div class="body-font">
                    <div class="content-block reveal-up">
                        <p>Please respond by <strong>Date TBD</strong>.</p>
                        <br>
                        <p>Add your RSVP form or link here.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../script.js"></script>
</body>
</html>
