<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story — Gibson &amp; Messer</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="texture-overlay"></div>

    <div class="menu-overlay" id="menu-overlay">
        <div class="menu-grid">
            <div class="menu-col">
                <a href="/"            class="statement-font menu-link menu-close-trigger">Home</a>
                <a href="/our-story/"  class="statement-font menu-link menu-close-trigger active">Our story</a>
                <a href="/events/"     class="statement-font menu-link menu-close-trigger">Events</a>
                <a href="/travel/"     class="statement-font menu-link menu-close-trigger">Travel</a>
            </div>
            <div class="menu-col">
                <a href="/rsvp/"      class="subheader-font menu-sublink menu-close-trigger">Rsvp</a>
                <a href="/registry/"  class="subheader-font menu-sublink menu-close-trigger">Registry</a>
                <a href="/faq/"       class="subheader-font menu-sublink menu-close-trigger">Faq</a>
            </div>
        </div>
    </div>

    <nav>
        <a href="/" class="nav-logo">
            <img src="../assets/monogram.png" alt="Gibson &amp; Messer Monogram">
        </a>
        <button class="hamburger" id="menu-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main>
        <section class="page-hero">
            <div class="page-hero-bg" style="background: linear-gradient(rgba(30,58,74,0.5), rgba(42,31,20,0.8)), url('../assets/CityScape.jpeg') center/cover no-repeat;"></div>
            <h1 class="statement-font reveal-up">Our story</h1>
        </section>

        <section class="story-section">
            <div class="reveal-up">
                <h2 class="statement-font section-title">How we met</h2>
            </div>
            <div class="story-content body-font">
                <p class="reveal-up">Add your story here.</p>
            </div>
        </section>

        <section class="image-break">
            <div class="image-wrapper reveal-up">
                <img src="../assets/CityScape.jpeg" alt="Gibson and Messer">
            </div>
        </section>

        <section class="story-section" style="background: radial-gradient(circle at 20% 80%, var(--color-surface-page) 0%, #E8DFCC 100%);">
            <div class="reveal-up">
                <h2 class="statement-font section-title">The proposal</h2>
            </div>
            <div class="story-content body-font">
                <p class="reveal-up">Add your proposal story here.</p>
            </div>
        </section>

        <footer class="footer-cta" style="background-image: linear-gradient(rgba(30,58,74,0.7), rgba(42,31,20,0.9)), url('../assets/Florals 2.png');">
            <h2 class="statement-font reveal-up">Join us</h2>
            <div class="reveal-up delay-1" style="margin-top: 3rem;">
                <a href="/rsvp/" class="footer-btn subheader-font">RSVP</a>
            </div>
        </footer>
    </main>

    <script src="../script.js"></script>
</body>
</html>
